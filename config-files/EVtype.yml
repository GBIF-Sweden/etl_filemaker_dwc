dataset: EVtype
dwca_metadata:
  dataset_name: "NRM Invertebrates Type Collection"
  description: "Darwin Core Archive export for the NRM invertebrates type collection."
  citation: "NRM Invertebrates Type Collection. Darwin Core Archive export."
  rights: "CC BY 4.0"
  license: "https://creativecommons.org/licenses/by/4.0/"
occurrence:
  defaults:
    basisOfRecord: PreservedSpecimen
    collectionCode: EVtype
    institutionCode: NRM
  extract:
    delimiter: ;
    encoding: utf8
    srcFilePath: ./data/ZOO/verbatim/EVtype.csv
    dtype:
      catalogNumber: str
      individualCount: str
      day: str
      month: str
      year: str
      endDay: str
      endMonth: str
      endYear: str
      dateIdentified: str
  load:
    database_name: local_filemaker_exports
    database_port: '3306'
    database_table: dwc_invertebrates_type
    database_table_pk_column: occurrenceID
    delimiter: "\t"
    encoding: utf8
    targetFilePath: ./data/ZOO/processed/dwc_invertebrates_type.csv
    write_to_db: true
    write_to_file: true
    write_to_dwca: true
    dwcaPath: ./output/dr31/dr31.zip
    dwc_fields: {}
    batch_size: 100
  mapping:
    catalogedDate: modified
  transformations:
    - function: clean_whitespace
      params: {}
    - function: generate_occ_id_triplet
      params: {}
    - function: replace_values
      params:
        columns_to_replace:
          - country
        to_replace: 'UNKNOWN COUNTRY'
        value: ''
    - function: replace_values
      params:
        columns_to_replace:
          - country
        to_replace: 'UNDETERMINED COUNTRY'
        value: ''
    - function: replace_values
      params:
        columns_to_replace:
          - country
          - stateProvince
          - waterBody
        to_replace: 'UNKNOWN'
        value: ''
    - function: replace_values
      params:
        columns_to_replace:
          - country
          - stateProvince
          - waterBody
        to_replace: 'Unkown'
        value: ''
    - function: replace_values
      params:
        columns_to_replace:
          - country
          - stateProvince
          - waterBody
        to_replace: 'Unknown'
        value: ''
    - function: replace_values
      params:
        columns_to_replace:
          - country
          - stateProvince
          - waterBody
        to_replace: 'N/A'
        value: ''
    - function: trim_value
      params:
        column: waterBody
        value: ":"
    - function: clean_whitespace
      params: {}
    - function: trim_value
      params:
        column: month
        value: "00"
    - function: trim_value
      params:
        column: day
        value: "00"
    - function: create_date
      params:
        col_year: year
        col_month: month
        col_day: day
        col_date: eventDate
    - function: convert_date_columns
      params:
        date_column: modified
#    - function: create_dynamicproperties
#      params:
#        list_of_columns:
#          - createdDate
#          - expeditionName
#          - endDay
#          - endMonth
#          - endYear
#          - preservation
#          - synonyms
#          - catalogedDate
#          - stationNumber
    - function: drop_empty_rows
      params:
        column_to_check: catalogNumber
    - function: drop_unmapped_columns
      params: {}
  unmapped:
    - createdDate
    - expeditionName
    - endDay
    - endMonth
    - endYear
#    - preservation
    - synonyms
    - stationNumber
multimedia:
  defaults:
    collectionCode: EVtype
    institutionCode: NRM
    type: StillImage
    license: http://creativecommons.org/licenses/by/4.0/legalcode
  extract:
    delimiter: ;
    encoding: utf8
    srcFilePath: ./data/ZOO/verbatim/EVtypeimages.csv
    dtype:
      catalogNumber: str
  load:
    database_hostname: localhost
    database_name: local_filemaker_exports
    database_port: '3306'
    database_table: multimedia_invertebrates_type
    database_table_pk_column: 'identifier'
    delimiter: "\t"
    encoding: utf8
    targetFilePath: ./data/ZOO/processed/multimedia_invertebrates_type.csv
    write_to_db: true
    write_to_file: true
  mapping:
    CatalogNumber: catalogNumber
    ImageFileName: identifier
  transformations:
    - function: clean_whitespace
      params: {}
    - function: generate_occ_id_triplet
      params: {}
    - function: addprefix
      params:
        target_column: identifier
        prefix: https://media-service.nrm.se/images?dataset=et&id=Full_size/
    - function: drop_unmapped_columns
      params: {}
  unmapped:
    - CollCatID
    - ImagePath
    - ThumbPath
    - ThumbFileName
    - catalogNumber
    - institutionCode
    - collectionCode
